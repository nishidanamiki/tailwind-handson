<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>レスポンシブカードレイアウトの練習</title>
    <link rel="stylesheet" href="/dist/output.css" />
  </head>
  <body class="bg-gray-100 p-4 sm:p-6">
    <!-- カードコンテナ -->
    <div
      class="max-w-sm md:max-w-2xl mx-auto bg-white rounded-lg shadow-md overflow-hidden md:flex"
    >
      <!-- カード画像 -->
      <div class="md:w-1/3">
        <img
          src="https://via.placeholder.com/400x250"
          alt="Card Image"
          class="w-full h-full object-cover"
        />
      </div>
      <!-- カード本文 -->
      <div class="p-6 md:w-2/3">
        <h2 class="text-xl font-bold text-gray-800 mb-2">カードのタイトル</h2>
        <p class="text-gray-600 text-base">
          ここにカードの詳細な説明文が入ります。モバイルではこのように画像の下にテキストが表示されます。
        </p>
      </div>
    </div>
  </body>
</html>
